quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/betting_agent}}
quarkus.datasource.reactive.url=${QUARKUS_DATASOURCE_REACTIVE_URL:vertx-reactive:postgresql://localhost:5432/betting_agent}
quarkus.datasource.username=${DB_USER:betting_agent}
quarkus.datasource.password=${DB_PASSWORD:betting_agent}

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.packages=com.betagent.persistence.entity
quarkus.hibernate-reactive.database.generation=none
quarkus.hibernate-reactive.packages=com.betagent.persistence.entity
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# Active odds provider (swap implementation without touching collector)
betagent.provider.active=${BETAGENT_ODDS_PROVIDER:odds-api-io}

# Odds-API.io — values from .env (lines 9-12)
betagent.odds-api.base-url=${ODDS_API_IO_BASE_URL:https://api.odds-api.io/v3}
betagent.odds-api.api-key=${ODDS_API_IO_KEY:}
betagent.odds-api.api-key-secondary=${ODDS_API_IO_KEY_SECONDARY:}
betagent.odds-api.api-key-tertiary=${ODDS_API_IO_KEY_TERTIARY:}
betagent.odds-api.sport=${ODDS_API_IO_SPORT:football}
betagent.odds-api.bookmakers=${ODDS_API_IO_BOOKMAKERS:Bet365,SBOBET}
betagent.odds-api.request-budget=${ODDS_API_IO_REQUEST_BUDGET:100}
betagent.odds-api.event-limit=${ODDS_API_IO_EVENT_LIMIT:900}
betagent.odds-api.reserved-event-requests=${ODDS_API_IO_RESERVED_EVENT_REQUESTS:2}
betagent.odds-api.max-odds-requests-per-run=${ODDS_API_IO_MAX_ODDS_REQUESTS_PER_RUN:95}
betagent.odds-api.odds-chunk-size=${ODDS_API_IO_ODDS_CHUNK_SIZE:10}
betagent.odds-api.odds-fetch-mode=${ODDS_API_IO_ODDS_FETCH_MODE:pending_only}
betagent.odds-api.skip-odds-snapshot-within-hours=${ODDS_API_IO_SKIP_ODDS_WITHIN_HOURS:1}
betagent.odds-api.min-minutes-between-runs=${ODDS_API_IO_MIN_MINUTES_BETWEEN_RUNS:50}
betagent.odds-api.stale-run-minutes=${ODDS_API_IO_STALE_RUN_MINUTES:20}
betagent.odds-api.collection-enabled=${ODDS_API_IO_COLLECTION_ENABLED:true}
betagent.odds-api.collection-interval=${ODDS_API_IO_COLLECTION_INTERVAL:1h}
betagent.odds-api.collection-tick-interval=${ODDS_API_IO_COLLECTION_TICK_INTERVAL:15m}
betagent.odds-api.collection-cron=${ODDS_API_IO_COLLECTION_CRON:0 0 * ? * *}
betagent.odds-api.collection-run-on-startup=${ODDS_API_IO_COLLECTION_RUN_ON_STARTUP:true}
betagent.odds-api.odds-retry-attempts-on429=${ODDS_API_IO_ODDS_RETRY_ATTEMPTS_ON_429:2}
betagent.odds-api.odds-retry-delay-seconds-on429=${ODDS_API_IO_ODDS_RETRY_DELAY_SECONDS_ON_429:30}
quarkus.rest-client.odds-api-io.url=${betagent.odds-api.base-url}
quarkus.rest-client.odds-api-io.scope=jakarta.inject.Singleton

betagent.predictions.min-samples=${PREDICTION_MIN_SAMPLES:8}
betagent.predictions.min-edge=${PREDICTION_MIN_EDGE:0.08}
betagent.predictions.min-confidence-low=${PREDICTION_MIN_CONFIDENCE:0.45}

betagent.nesine.enabled=${NESINE_ENABLED:true}
betagent.nesine.base-url=${NESINE_BASE_URL:https://bulten.nesine.com}
betagent.nesine.live-score-url=${NESINE_LIVE_SCORE_URL:https://ls.nesine.com}
betagent.nesine.score-job-enabled=${NESINE_SCORE_JOB_ENABLED:true}
quarkus.rest-client.nesine-bulten.url=${betagent.nesine.base-url}
quarkus.rest-client.nesine-bulten.scope=jakarta.inject.Singleton
quarkus.rest-client.nesine-livescore.url=${betagent.nesine.live-score-url}
quarkus.rest-client.nesine-livescore.scope=jakarta.inject.Singleton
quarkus.rest-client.nesine-bulten.connect-timeout=15000
quarkus.rest-client.nesine-bulten.read-timeout=45000
quarkus.rest-client.nesine-livescore.connect-timeout=15000
quarkus.rest-client.nesine-livescore.read-timeout=45000
