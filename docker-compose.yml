services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: betting_agent
      POSTGRES_USER: betting_agent
      POSTGRES_PASSWORD: betting_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betting_agent -d betting_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./quarkus
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/betting_agent
      QUARKUS_DATASOURCE_REACTIVE_URL: vertx-reactive:postgresql://postgres:5432/betting_agent
      QUARKUS_DATASOURCE_USERNAME: betting_agent
      QUARKUS_DATASOURCE_PASSWORD: betting_agent
      ODDS_API_IO_KEY: ${ODDS_API_IO_KEY:-}
      ODDS_API_IO_BASE_URL: ${ODDS_API_IO_BASE_URL:-https://api.odds-api.io/v3}
      ODDS_API_IO_SPORT: football
      ODDS_API_IO_BOOKMAKERS: ${ODDS_API_IO_BOOKMAKERS:-Bet365,SBOBET}
      ODDS_API_IO_REQUEST_BUDGET: ${ODDS_API_IO_REQUEST_BUDGET:-100}
      ODDS_API_IO_EVENT_LIMIT: ${ODDS_API_IO_EVENT_LIMIT:-900}
      ODDS_API_IO_MAX_ODDS_REQUESTS_PER_RUN: ${ODDS_API_IO_MAX_ODDS_REQUESTS_PER_RUN:-95}
      ODDS_API_IO_ODDS_FETCH_MODE: ${ODDS_API_IO_ODDS_FETCH_MODE:-pending_only}
      ODDS_API_IO_SKIP_ODDS_WITHIN_HOURS: ${ODDS_API_IO_SKIP_ODDS_WITHIN_HOURS:-1}
      ODDS_API_IO_MIN_MINUTES_BETWEEN_RUNS: ${ODDS_API_IO_MIN_MINUTES_BETWEEN_RUNS:-50}
      ODDS_API_IO_COLLECTION_ENABLED: ${ODDS_API_IO_COLLECTION_ENABLED:-true}
      ODDS_API_IO_COLLECTION_INTERVAL: ${ODDS_API_IO_COLLECTION_INTERVAL:-1h}
      PREDICTION_MIN_SAMPLES: ${PREDICTION_MIN_SAMPLES:-8}
      PREDICTION_MIN_EDGE: ${PREDICTION_MIN_EDGE:-0.08}
      PREDICTION_MIN_CONFIDENCE: ${PREDICTION_MIN_CONFIDENCE:-0.45}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
